<mat-card class="kelly-card">
  <mat-card-header>
    <mat-card-title>凱利準則計算機</mat-card-title>
    <mat-card-subtitle>{{ match.home_team }} vs {{ match.away_team }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>可用資金</mat-label>
      <input matInput type="number" [(ngModel)]="bankroll" min="1" />
    </mat-form-field>
    <p class="result">建議下注金額：<strong>{{ suggestedStake | number:'1.2-2' }}</strong></p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button (click)="close()">關閉</button>
  </mat-card-actions>
</mat-card>
